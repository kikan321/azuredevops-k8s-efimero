# ============================================================
# Azure DevOps CI Pipeline - Kubernetes Validation
# ============================================================

trigger:
  branches:
    include:
      - main

  paths:
    include:
      - k8s-manifests/deployment.yaml

pool:
  vmImage: 'ubuntu-latest'

jobs:
- job: KubernetesValidation
  displayName: 'Kubernetes CI Validation Pipeline'

  steps:

  # ==========================================================
  # STEP 0 - Checkout repository
  # ==========================================================
  - checkout: self
    displayName: 'Checkout repository'

  # ==========================================================
  # STEP 1 - Install KinD
  # ==========================================================
  - script: |
      set +e
      TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

      echo "Installing KinD..."

      curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64 \
        > step1_output_${TIMESTAMP}.log 2>&1

      chmod +x ./kind >> step1_output_${TIMESTAMP}.log 2>&1
      sudo mv ./kind /usr/local/bin/kind >> step1_output_${TIMESTAMP}.log 2>&1

      kind version >> step1_output_${TIMESTAMP}.log 2>&1
      EXIT_CODE=$?

      if [ $EXIT_CODE -ne 0 ]; then
        echo "FAIL STEP 1 - KinD installation" > fail_step1_${TIMESTAMP}.log
        cat step1_output_${TIMESTAMP}.log >> fail_step1_${TIMESTAMP}.log
        exit 1
      fi

      set -e
    displayName: 'Install KinD'

  # ==========================================================
  # STEP 2 - Install kubectl
  # ==========================================================
  - script: |
      set +e
      TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

      echo "Installing kubectl..."

      curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
        > step2_output_${TIMESTAMP}.log 2>&1

      chmod +x kubectl >> step2_output_${TIMESTAMP}.log 2>&1
      sudo mv kubectl /usr/local/bin/ >> step2_output_${TIMESTAMP}.log 2>&1

      kubectl version --client >> step2_output_${TIMESTAMP}.log 2>&1
      EXIT_CODE=$?

      if [ $EXIT_CODE -ne 0 ]; then
        echo "FAIL STEP 2 - kubectl installation" > fail_step2_${TIMESTAMP}.log
        cat step2_output_${TIMESTAMP}.log >> fail_step2_${TIMESTAMP}.log
        exit 1
      fi

      set -e
    displayName: 'Install kubectl'

  # ==========================================================
  # STEP 3 - Install kube-linter
  # ==========================================================
  - script: |
      set -e
      TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

      echo "Installing kube-linter..."

      curl -Lo kube-linter.tar.gz \
        https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux.tar.gz

      tar -xzf kube-linter.tar.gz

      chmod +x kube-linter
      sudo mv kube-linter /usr/local/bin/

      echo "kube-linter version:"
      kube-linter version | tee step3_output_${TIMESTAMP}.log
    displayName: 'Install kube-linter'

  # ==========================================================
  # STEP 4 - kube-linter validation
  # ==========================================================
  - script: |
      set -e
      TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

      echo "Running kube-linter..."

      which kube-linter | tee step4_output_${TIMESTAMP}.log
      kube-linter version | tee -a step4_output_${TIMESTAMP}.log

      kube-linter lint k8s-manifests/deployment.yaml | tee -a step4_output_${TIMESTAMP}.log
    displayName: 'Run kube-linter'

  # ==========================================================
  # STEP 5 - Create KinD cluster
  # ==========================================================
  - script: |
      set +e
      TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

      echo "Creating KinD cluster..."

      kind create cluster --name cluster-cv \
        > step5_output_${TIMESTAMP}.log 2>&1

      EXIT_CODE=$?

      if [ $EXIT_CODE -ne 0 ]; then
        echo "FAIL STEP 5 - cluster creation" > fail_step5_${TIMESTAMP}.log
        cat step5_output_${TIMESTAMP}.log >> fail_step5_${TIMESTAMP}.log
        exit 1
      fi
    displayName: 'Create KinD Cluster'

  # ==========================================================
  # STEP 6 - Verify cluster health
  # ==========================================================
  - script: |
      set -e
      TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

      kubectl cluster-info --context kind-cluster-cv \
        > step6_output_${TIMESTAMP}.log 2>&1

      kubectl get nodes >> step6_output_${TIMESTAMP}.log 2>&1
    displayName: 'Verify Cluster Health'

  # ==========================================================
  # STEP 7 - Deploy application
  # ==========================================================
  - script: |
      set -e
      TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

      kubectl apply -f k8s-manifests/deployment.yaml \
        > step7_output_${TIMESTAMP}.log 2>&1
    displayName: 'Deploy Application'

  # ==========================================================
  # STEP 8 - Rollout validation
  # ==========================================================
  - script: |
      set -e
      kubectl rollout status deployment/mi-app-prueba --timeout=120s
    displayName: 'Verify Rollout Status'

  # ==========================================================
  # STEP 9 - Availability check
  # ==========================================================
  - script: |
      set -e
      kubectl wait --for=condition=available deployment/mi-app-prueba --timeout=120s
    displayName: 'Verify Deployment Availability'

  # ==========================================================
  # STEP 10 - Collect cluster state
  # ==========================================================
  - script: |
      TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

      {
        echo "===== DEPLOYMENTS ====="
        kubectl get deployments

        echo "===== PODS ====="
        kubectl get pods -o wide

        echo "===== SERVICES ====="
        kubectl get svc

        echo "===== EVENTS ====="
        kubectl get events --sort-by=.metadata.creationTimestamp
      } > cluster_state_${TIMESTAMP}.log
    displayName: 'Collect Cluster State'

  # ==========================================================
  # STEP 11 - Publish artifacts
  # ==========================================================
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Pipeline Artifacts'
    condition: always()
    inputs:
      pathToPublish: .
      artifactName: k8s-validation-artifacts
